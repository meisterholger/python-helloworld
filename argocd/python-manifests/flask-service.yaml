apiVersion: v1
kind: Service
metadata:
  name: flask-app-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: meine-web-app # Muss exakt zum Label im Deployment passen
  ports:
    - protocol: TCP
      port: 80         # Interner Cluster-Port
      targetPort: 5000 # Dein Flask-Port im Container
      nodePort: 30080  # Der Port für deinen Browser