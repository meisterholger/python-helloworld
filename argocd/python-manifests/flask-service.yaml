apiVersion: v1
kind: Service
metadata:
  name: flask-app-service
  namespace: default # Oder der Namespace, in dem deine App läuft
spec:
  type: NodePort
  selector:
    app: flask-kreditrechner # WICHTIG: Muss exakt mit dem Label in deinem Flask-Deployment übereinstimmen!
  ports:
    - protocol: TCP
      port: 5000       # Port innerhalb des Clusters
      targetPort: 5000 # Port, auf dem Flask im Container lauscht
      nodePort: 30080  # Dein Wunsch-Port für den Browser (30000-32767)