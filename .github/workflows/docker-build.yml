# This is a basic workflow to help you get started with Actions

name: Docker Build and Push

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -t meisterholger/python-helloworld:v${{ github.run_number }} .
          docker push meisterholger/python-helloworld:v${{ github.run_number }}

  update-manifest:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update deployment.yaml
        run: |
          # Nutzt 'sed', um die Image-Zeile mit der neuen v-Nummer zu überschreiben
          sed -i "s|image: meisterholger/python-helloworld:.*|image: meisterholger/python-helloworld:v${{ github.run_number }}|g" argocd/python-manifests/deployment.yaml

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add argocd/python-manifests/deployment.yaml
          git commit -m "Bump image version to v${{ github.run_number }}"
          git push